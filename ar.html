<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OptiSim AR - Eye Surgery in Augmented Reality</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }

        .ar-overlay {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 16px; display: flex; justify-content: space-between;
            align-items: flex-start; pointer-events: none;
        }
        .ar-overlay > * { pointer-events: auto; }

        .ar-title {
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px 16px; color: white;
        }
        .ar-title h3 { font-size: 0.9rem; color: #00d4aa; margin-bottom: 2px; }
        .ar-title p { font-size: 0.7rem; color: #8892a4; }

        .ar-btn {
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,212,170,0.3); border-radius: 10px;
            padding: 10px 16px; color: white; font-size: 0.8rem;
            cursor: pointer; text-decoration: none; display: flex;
            align-items: center; gap: 6px;
        }
        .ar-btn:hover { border-color: #00d4aa; }

        .ar-bottom {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            padding: 16px; display: flex; justify-content: center; gap: 10px;
            pointer-events: none;
        }
        .ar-bottom > * { pointer-events: auto; }

        .ar-step-btn {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,212,170,0.3); border-radius: 50px;
            padding: 12px 24px; color: white; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .ar-step-btn:hover { background: rgba(0,212,170,0.2); border-color: #00d4aa; }
        .ar-step-btn:disabled { opacity: 0.3; }
        .ar-step-btn.primary { background: rgba(0,212,170,0.3); border-color: #00d4aa; }

        .ar-info {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,212,170,0.2); border-radius: 12px;
            padding: 14px 20px; color: white; max-width: 400px;
            text-align: center; z-index: 100;
        }
        .ar-info h4 { font-size: 0.85rem; color: #00d4aa; margin-bottom: 4px; }
        .ar-info p { font-size: 0.72rem; color: #8892a4; line-height: 1.4; }

        .ar-hint {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border-radius: 16px;
            padding: 30px 40px; color: white; text-align: center;
            z-index: 200; animation: fadeIn 0.5s ease;
        }
        .ar-hint h2 { font-size: 1.2rem; color: #00d4aa; margin-bottom: 8px; }
        .ar-hint p { font-size: 0.85rem; color: #8892a4; margin-bottom: 4px; }
        .ar-hint.hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

    <!-- A-Frame AR Scene with Hiro marker -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true; sortObjects: true;"
    >
        <a-entity camera></a-entity>

        <!-- Hiro marker (most common, built-in) -->
        <a-marker preset="hiro" id="eye-marker">
            <a-entity
                id="ar-eye-model"
                gltf-model="url(assets/anatomy_of_the_eye.glb)"
                scale="0.3 0.3 0.3"
                position="0 0.5 0"
                rotation="-90 0 0"
                animation="property: rotation; to: -90 360 0; loop: true; dur: 20000; easing: linear;"
            ></a-entity>

            <!-- Annotations -->
            <a-entity id="ar-labels">
                <a-text value="Cornea" position="0 1.2 0.4" scale="0.3 0.3 0.3" color="#00d4aa" align="center"></a-text>
                <a-text value="Iris" position="0 1.0 0.25" scale="0.25 0.25 0.25" color="#4a8c6f" align="center"></a-text>
                <a-text value="Lens" position="0 0.8 0.1" scale="0.25 0.25 0.25" color="#d4c090" align="center"></a-text>
                <a-text value="Retina" position="-0.3 0.6 -0.2" scale="0.2 0.2 0.2" color="#cc4444" align="center"></a-text>
                <a-text value="Optic Nerve" position="0 0.3 -0.5" scale="0.2 0.2 0.2" color="#daa520" align="center"></a-text>
            </a-entity>

            <a-light type="ambient" color="#fff" intensity="0.8"></a-light>
            <a-light type="directional" color="#fff" intensity="1.2" position="1 2 1"></a-light>
            <a-light type="point" color="#00d4aa" intensity="0.3" position="0 1.5 0.5"></a-light>
        </a-marker>
    </a-scene>

    <!-- UI Overlay -->
    <div class="ar-overlay">
        <div class="ar-title">
            <h3>OptiSim AR</h3>
            <p>Point camera at Hiro marker</p>
        </div>
        <a href="index.html" class="ar-btn">&larr; Back to 3D</a>
    </div>

    <!-- Initial hint -->
    <div class="ar-hint" id="ar-hint">
        <h2>AR Mode</h2>
        <p>Print or display the <strong>Hiro marker</strong>.</p>
        <p>Point your camera at it to see the 3D eye.</p>
        <p style="margin-top: 12px; font-size: 0.72rem; color: #666;">
            <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
               target="_blank" style="color: #00d4aa;">Download Hiro Marker Image</a>
        </p>
        <br>
        <button class="ar-step-btn primary" onclick="document.getElementById('ar-hint').classList.add('hidden');">
            Got it — Start AR
        </button>
    </div>

    <!-- Step info -->
    <div class="ar-info" id="ar-info">
        <h4 id="ar-step-name">Full Eye Anatomy</h4>
        <p id="ar-step-desc">Complete 3D eye model. Rotate the marker to view from all angles.</p>
    </div>

    <!-- Navigation -->
    <div class="ar-bottom">
        <button class="ar-step-btn" id="ar-prev" onclick="arPrevStep()" disabled>&larr; Prev</button>
        <button class="ar-step-btn primary" id="ar-next" onclick="arNextStep()">Next View &rarr;</button>
    </div>

    <script>
        const arSteps = [
            { name: "Full Eye Anatomy", desc: "All structures visible. Rotate the marker to explore.", scale: "0.3 0.3 0.3", rot: "-90 0 0", anim: true },
            { name: "Anterior View", desc: "Surgeon's view — looking at the cornea, iris, and pupil.", scale: "0.45 0.45 0.45", rot: "0 0 0", anim: false },
            { name: "Corneal Incision Site", desc: "Temporal limbus where the 2.4mm keratome incision is made.", scale: "0.4 0.4 0.4", rot: "-90 45 0", anim: false },
            { name: "Cross-Section", desc: "Internal anatomy: lens, capsule, zonules, vitreous, retina.", scale: "0.4 0.4 0.4", rot: "-90 90 0", anim: false },
            { name: "Posterior View", desc: "Optic nerve head and retinal vasculature from behind.", scale: "0.4 0.4 0.4", rot: "-90 180 0", anim: false },
        ];
        let arStep = 0;

        function arUpdateStep() {
            const s = arSteps[arStep];
            document.getElementById('ar-step-name').textContent = s.name;
            document.getElementById('ar-step-desc').textContent = s.desc;
            const model = document.getElementById('ar-eye-model');
            model.setAttribute('scale', s.scale);
            if (s.anim) {
                model.setAttribute('animation', 'property: rotation; to: -90 360 0; loop: true; dur: 20000; easing: linear;');
            } else {
                model.removeAttribute('animation');
                model.setAttribute('rotation', s.rot);
            }
            document.getElementById('ar-prev').disabled = arStep === 0;
            document.getElementById('ar-next').textContent = arStep === arSteps.length - 1 ? 'Done' : 'Next View →';
        }

        function arNextStep() {
            if (arStep < arSteps.length - 1) { arStep++; arUpdateStep(); }
        }
        function arPrevStep() {
            if (arStep > 0) { arStep--; arUpdateStep(); }
        }

        // Hide hint when marker found
        const marker = document.getElementById('eye-marker');
        if (marker) marker.addEventListener('markerFound', () => {
            document.getElementById('ar-hint').classList.add('hidden');
        });
    </script>
</body>
</html>
